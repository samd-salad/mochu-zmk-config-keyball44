# Left (peripheral) sleeps faster — when central disconnects and goes to sleep,
# the peripheral wastes battery advertising. Shorten to 5 min so it follows
# the central into deep sleep sooner.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# Blank OLED after 5s instead of 10s — peripheral display only shows
# battery + "OK", doesn't need to stay lit as long
CONFIG_ZMK_IDLE_TIMEOUT=5000
