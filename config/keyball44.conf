# Host BLE connection parameters (does NOT affect split link)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=16
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=32
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
CONFIG_BT_BUF_ACL_TX_COUNT=4
CONFIG_BT_BUF_EVT_RX_COUNT=4
CONFIG_BT_L2CAP_TX_BUF_COUNT=8

# Split link — right is central so trackball unaffected by split latency
CONFIG_ZMK_SPLIT_BLE_PREF_INT=12

# auto deep sleep after 15 min idle (Home+End combo for instant sleep)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# BT TX power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# enable DCDC for ~1.5mA savings — verify SuperMini has L1 inductor near nRF chip
CONFIG_BOARD_ENABLE_DCDC=y
# HV DCDC is harmful on clones, keep disabled
CONFIG_BOARD_ENABLE_DCDC_HV=n

CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=128

CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
CONFIG_ZMK_IDLE_TIMEOUT=10000
CONFIG_ZMK_EXT_POWER=y

# reduce OLED brightness further
CONFIG_SSD1306_DEFAULT_CONTRAST=16

# slow down LVGL task handler (status screen is mostly static)
CONFIG_ZMK_DISPLAY_TICK_PERIOD_MS=250

# soft off (deep sleep via combo)
CONFIG_ZMK_PM_SOFT_OFF=y

# device power management — auto-suspend SPI/I2C when idle
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

# prevent NFC frontend leakage (P0.09 used as SPI CS)
CONFIG_NFCT_PINS_AS_GPIOS=y

# disable serial/logging — UART draws ~600uA even when nobody reads it
CONFIG_SERIAL=n
CONFIG_LOG=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_ZMK_USB_LOGGING=n

# battery reporting less frequent
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=120
